# shop-gateway on Kubernetes (preprod). Routes /api/* to backend services by
# their k8s Service DNS names (defaults in the image's application.yml match).
# Apply: kubectl --context kind-preprod apply -f shop-gateway/k8s/shop-gateway.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shop-gateway-config
  namespace: shop
data:
  SPRING_PROFILES_ACTIVE: "preprod"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-gateway
  namespace: shop
  labels:
    app: shop-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shop-gateway
  template:
    metadata:
      labels:
        app: shop-gateway
    spec:
      containers:
        - name: shop-gateway
          image: localhost/shop-gateway:0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shop-gateway-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: shop-gateway
  namespace: shop
spec:
  type: ClusterIP
  selector:
    app: shop-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
