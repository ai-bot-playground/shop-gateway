spring:
  application:
    name: shop-gateway
  cloud:
    gateway:
      # Spring Cloud Gateway 2025.1 (Boot 4) moved route config under
      # server.webflux.* — the old spring.cloud.gateway.routes prefix is ignored
      # and silently yields a gateway with zero routes (every request -> 404).
      server:
        webflux:
          routes:
            - id: catalog
              uri: ${CATALOG_SERVICE_URI:http://shop-catalog:8080}
              predicates:
                - Path=/api/products/**
              filters:
                - StripPrefix=1
            - id: order
              uri: ${ORDER_SERVICE_URI:http://shop-order:8080}
              predicates:
                - Path=/api/orders/**
              filters:
                - StripPrefix=1
            - id: inventory
              uri: ${INVENTORY_SERVICE_URI:http://shop-inventory:8080}
              predicates:
                - Path=/api/inventory/**
              filters:
                - StripPrefix=1
management:
  endpoints:
    web:
      exposure:
        include: health,info
